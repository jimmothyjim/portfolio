<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Jimmy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #eef0e8;
      --bg-2: #e3e7d8;
      --bg-3: #d7dbc7;
      --fg: #1c1f18;
      --fg-dim: #55594c;
      --fg-faint: #828778;
      --accent: #4a6a3d;
      --accent-2: #7a9960;
      --line: rgba(28,31,24,0.08);
      --hero-bg: #ffffff;
      --hero-h: 360px;
      --hero-opacity: 0.95;
      --name-color: #384507;
    }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    * { box-sizing: border-box; }
    a { color: inherit; }
    button { font: inherit; color: inherit; border: 0; background: transparent; cursor: pointer; }

    .page { width: 100%; position: relative; }
    .hero-content,
    .actions,
    .section,
    .foot { max-width: 1280px; margin-left: auto; margin-right: auto; }

    .hero {
      position: relative;
      height: var(--hero-h, 480px);
      overflow: hidden;
      background: var(--bg);
    }
    .hero::before {
      content: "";
      position: absolute; inset: 0;
      background: var(--hero-bg, var(--bg-2));
      opacity: var(--hero-opacity, 1);
      z-index: 0;
    }
    .hero-img {
      position: absolute; inset: 0;
      background: transparent;
      background-size: cover;
      background-position: center;
      z-index: 1;
    }
    .hero-content {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 0 40px 28px;
      z-index: 4;
    }
    .hero-kicker {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--fg);
      opacity: 0.85;
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 12px;
    }
    .hero-kicker .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
    }
    .hero-name {
      font-family: 'Instrument Serif', serif;
      font-weight: 400;
      font-size: clamp(96px, 16vw, 220px);
      line-height: 0.85;
      letter-spacing: -0.02em;
      margin: 0;
      color: var(--name-color, var(--fg));
      text-shadow: 0 2px 40px rgba(0,0,0,0.1);
      display: inline-block;
      white-space: nowrap;
    }
    .actions {
      display: flex; align-items: center; gap: 18px;
      padding: 24px 40px 12px;
      background: linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 100%);
    }
    .pill-btn {
      padding: 8px 18px;
      border: 1px solid var(--fg-faint);
      border-radius: 999px;
      color: var(--fg);
      font-size: 13px;
      font-weight: 500;
      transition: border-color .15s, transform .15s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }
    .pill-btn:hover { border-color: var(--fg); transform: scale(1.03); }

    .section { padding: 36px 40px 16px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap; }
    .tab {
      padding: 7px 16px;
      border-radius: 999px;
      background: var(--bg-3);
      color: var(--fg);
      font-size: 13px;
      font-weight: 500;
      transition: background .15s, color .15s;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.05em;
    }
    .tab:hover { background: #c9cfb7; }
    .tab.active { background: var(--fg); color: var(--bg); }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
    }
    .card {
      display: block;
      cursor: pointer;
      transition: transform .2s ease;
      position: relative;
      text-decoration: none;
      color: inherit;
    }
    .card:hover { transform: translateY(-2px); }
    .card-thumb {
      aspect-ratio: 1 / 1;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      background: var(--bg-3);
      margin-bottom: 14px;
      background-size: cover;
      background-position: center;
    }
    .card-thumb .ph {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--fg-faint);
      text-align: center;
      padding: 16px;
    }
    .card-thumb .ph-bg { position: absolute; inset: 0; opacity: 0.5; }
    .card-thumb.has-image .ph, .card-thumb.has-image .ph-bg { display: none; }
    .card-title { font-size: 15px; font-weight: 500; margin: 0 0 4px; color: var(--fg); }
    .card-meta { font-size: 12px; color: var(--fg-dim); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.03em; }

    .worklist { display: flex; flex-direction: column; gap: 2px; }
    .work-row {
      display: grid;
      grid-template-columns: 1fr 200px 120px;
      gap: 24px;
      padding: 16px;
      border-radius: 6px;
      align-items: center;
      transition: background .15s;
    }
    .work-row:hover { background: var(--bg-3); }
    .work-row .role { font-size: 15px; font-weight: 500; color: var(--fg); margin: 0 0 2px; }
    .work-row .company { font-size: 13px; color: var(--fg-dim); }
    .work-row .loc { font-size: 13px; color: var(--fg-dim); font-family: 'JetBrains Mono', monospace; }
    .work-row .date { font-size: 13px; color: var(--fg-dim); text-align: right; font-family: 'JetBrains Mono', monospace; }

    .foot {
      padding: 48px 40px 64px;
      color: var(--fg-faint);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      display: flex; justify-content: space-between;
      border-top: 1px solid var(--line);
      margin-top: 32px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .bg-stripes-1 { background: repeating-linear-gradient(45deg, #6b4a3a 0 6px, #5a3d30 6px 12px); }
    .bg-stripes-2 { background: repeating-linear-gradient(135deg, #8c6a52 0 6px, #7a5a44 6px 12px); }
    .bg-stripes-3 { background: repeating-linear-gradient(90deg, #a58870 0 6px, #8c7058 6px 12px); }
    .bg-stripes-4 { background: repeating-linear-gradient(0deg, #4a3a2e 0 6px, #3d2f25 6px 12px); }
    .bg-stripes-5 { background: repeating-linear-gradient(60deg, #7a5a44 0 6px, #6b4a3a 6px 12px); }
    .bg-stripes-6 { background: repeating-linear-gradient(120deg, #8c7058 0 6px, #6b5142 6px 12px); }

    .error-note { color: #b24b4b; font-family: 'JetBrains Mono', monospace; }

    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
      .hero-name { font-size: 20vw; }
      .work-row { grid-template-columns: 1fr 80px; }
      .work-row .loc { display: none; }
      .hero-content, .actions, .section, .foot { padding-left: 20px; padding-right: 20px; }
    }
  </style>
</head>
<body>
<div class="page">
  <section class="hero">
    <div class="hero-img" id="heroImg"></div>
    <div class="hero-content">
      <div class="hero-kicker"><span class="dot"></span><span id="kickerText">Verified</span></div>
      <h1 class="hero-name" id="nameText">Jimmy</h1>
    </div>
  </section>

  <div class="actions">
    <a class="pill-btn" id="followBtn" target="_blank" rel="noopener">Follow</a>
  </div>

  <section class="section">
    <div class="tabs" id="tabs"></div>
    <div id="tabContent"><p>Loading…</p></div>
  </section>

  <footer class="foot">
    <span id="footL">© Jimmy · MMXXVI</span>
    <span id="footR">Hand-thrown · one of one</span>
  </footer>
</div>

<script>
(function(){
  const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  const state = {
    site: null,
    tabs: {
      work: [],
      portfolio: [],
      ceramics: []
    },
    currentTab: 'work'
  };

  function applyTheme(site) {
    const root = document.documentElement;
    const theme = site.theme || {};
    Object.entries(theme).forEach(([key, value]) => {
      if (value) root.style.setProperty(`--${key}`, value);
    });
    if (site.heroImage) {
      const hero = document.getElementById('heroImg');
      hero.style.backgroundImage = `url('${site.heroImage}')`;
    }
  }

  function renderTabs() {
    const tabsEl = document.getElementById('tabs');
    const labels = state.site.tabLabels || {};
    const defs = [
      ['work', labels.work || 'Work'],
      ['portfolio', labels.portfolio || 'Portfolio'],
      ['ceramics', labels.ceramics || 'Ceramics']
    ];

    tabsEl.innerHTML = defs.map(([key, label]) =>
      `<button class="tab ${state.currentTab === key ? 'active' : ''}" data-tab="${key}">${esc(label)}</button>`
    ).join('');
  }

  function renderWork() {
    const items = state.tabs.work;
    return '<div class="worklist">' + items.map(w => `
      <div class="work-row">
        <div>
          <p class="role">${esc(w.role)}</p>
          <span class="company">${esc(w.company)}</span>
        </div>
        <span class="loc">${esc(w.loc)}</span>
        <span class="date">${esc(w.date)}</span>
      </div>
    `).join('') + '</div>';
  }

  function renderGrid(items) {
    return '<div class="grid">' + items.map((it, i) => {
      const bg = 'bg-stripes-' + ((i % 6) + 1);
      const hasImg = !!it.img;
      const style = hasImg ? `style="background-image:url('${it.img}')"` : '';
      const target = it.external ? ' target="_blank" rel="noopener"' : '';
      const href = it.link || '#';
      return `
        <a class="card" href="${href}"${target}>
          <div class="card-thumb ${hasImg ? 'has-image' : ''}" ${style}>
            <div class="ph-bg ${bg}"></div>
            <div class="ph">${esc(it.title)}</div>
          </div>
          <p class="card-title">${esc(it.title)}</p>
          <span class="card-meta">${esc(it.meta)}</span>
        </a>
      `;
    }).join('') + '</div>';
  }

  function renderCurrentTab() {
    const content = document.getElementById('tabContent');
    if (state.currentTab === 'work') content.innerHTML = renderWork();
    else if (state.currentTab === 'portfolio') content.innerHTML = renderGrid(state.tabs.portfolio);
    else content.innerHTML = renderGrid(state.tabs.ceramics);
  }

  function initSite(site) {
    state.site = site;
    document.title = site.pageTitle || site.name || 'Portfolio';
    document.getElementById('kickerText').textContent = site.kicker || '';
    document.getElementById('nameText').textContent = site.name || '';
    const followBtn = document.getElementById('followBtn');
    followBtn.textContent = site.followLabel || 'Follow';
    followBtn.href = site.followLink || '#';
    document.getElementById('footL').textContent = site.footerLeft || '';
    document.getElementById('footR').textContent = site.footerRight || '';
    applyTheme(site);
    renderTabs();
    renderCurrentTab();
  }

  Promise.all([
    fetch('./content.json').then(r => r.json()),
    fetch('./content-work.json').then(r => r.json()),
    fetch('./content-portfolio.json').then(r => r.json()),
    fetch('./content-ceramics.json').then(r => r.json())
  ]).then(([site, work, portfolio, ceramics]) => {
    state.tabs.work = work;
    state.tabs.portfolio = portfolio;
    state.tabs.ceramics = ceramics;
    initSite(site);
  }).catch(err => {
    console.error(err);
    document.getElementById('tabContent').innerHTML = '<p class="error-note">Could not load JSON content files.</p>';
  });

  document.getElementById('tabs').addEventListener('click', e => {
    const btn = e.target.closest('[data-tab]');
    if (!btn) return;
    state.currentTab = btn.dataset.tab;
    renderTabs();
    renderCurrentTab();
  });
})();
</script>
</body>
</html>
